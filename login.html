<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Luna's POS">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon-96x96.png">
    <link rel="icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - POS System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- THEME VARIABLES --- */
        
         :root {
            --primary: #4f46e5;
            /* Main Indigo color used for buttons and active states */
            --bg: #f8fafc;
            /* Light gray-blue background for the body */
        }
        /* CSS Reset: Ensures consistent sizing across all browsers */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', sans-serif;
        }
        /* BODY LAYOUT: Flexbox centers the login card perfectly on the screen */
        
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* LOGIN CARD: The main container for the form */
        
        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            /* Limits width on desktop, stretches on mobile */
            padding: 40px;
            border-radius: 24px;
            /* Modern rounded corners */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        /* LOGO CONTAINER */
        
        .brand-icon {
            width: 220px;
            height: 120px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Ensures the logo isn't stretched */
        }
        
        h2 {
            color: #1e293b;
            margin-bottom: 5px;
        }
        
        p {
            color: #64748b;
            margin-bottom: 25px;
        }
        /* ROLE SELECTOR: A toggle switch for Admin vs. Staff */
        
        .role-selector {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .role-btn {
            flex: 1;
            /* Makes both buttons share the space equally */
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            color: #64748b;
            transition: 0.3s;
        }
        /* Active Role Styling: Makes the selected button look like it's "floating" */
        
        .role-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* INPUT FIELDS */
        
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }
        
        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        /* Visual feedback when the user clicks an input */
        
        input:focus {
            border-color: var(--primary);
            outline: 2px solid #c7d2fe;
        }
        /* SIGN IN BUTTON */
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            transition: 0.2s;
        }
        
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .footer-link {
            margin-top: 25px;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-icon">
            <img src="icon-512x512.png" alt="Luna's Logo">
        </div>

        <h2>Welcome Back</h2>
        <p>Please enter your details to sign in.</p>

        <div class="role-selector">
            <button type="button" class="role-btn active" onclick="setRole('admin', this)">Admin</button>
            <button type="button" class="role-btn" onclick="setRole('staff', this)">Staff</button>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email / Username</label>
                <input type="text" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-link">
            Forgot password? <a href="forgot_password.html">Reset via SMS</a><br style="margin:6px 0;display:block;"><span>Don't have an account? <a href="register.html">Create Account</a></span>
        </div>
    </div>

    <!-- PWA Install Banner hardcoded -->
    <div id="install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#4f46e5;color:white;padding:16px 20px;flex-direction:row;align-items:center;gap:12px;z-index:99999;box-shadow:0 -4px 20px rgba(0,0,0,0.2);font-family:sans-serif;">
        <img src="/icon-192x192.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0;">
        <div style="flex:1;">
            <div style="font-weight:700;font-size:15px;">Install Luna's POS</div>
            <div style="font-size:12px;opacity:0.85;" id="install-hint">Works offline · Faster access</div>
        </div>
        <button id="install-btn" style="background:white;color:#4f46e5;border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;flex-shrink:0;">Install</button>
        <button onclick="document.getElementById('install-banner').style.display='none'" style="background:none;border:none;color:white;font-size:26px;cursor:pointer;padding:0;flex-shrink:0;opacity:0.7;line-height:1;">×</button>
    </div>

    <script src="js/api.js"></script>
    <script>
        let currentRole = 'admin';

        function setRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = this.querySelector('.login-btn');
            const email = this.querySelector('input[type="text"]').value.trim();
            const password = this.querySelector('input[type="password"]').value;

            if (!email || !password) {
                alert('Please enter your email and password.');
                return;
            }

            btn.textContent = 'Signing in…';
            btn.disabled = true;

            const res = await api.auth.login(email, password, currentRole);

            if (res.success) {
                // Redirect based on actual role from DB (not just what was selected)
                if (res.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                alert(res.error || 'Invalid credentials. Check your email, password, and selected role.');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>

    <!-- PWA Registration -->
    <script src="js/pwa.js"></script>

    <script>
    // ── PWA Install Logic ──────────────────────────────────
    (function() {
        var deferredPrompt = null;
        var banner = document.getElementById('install-banner');
        var installBtn = document.getElementById('install-btn');
        var hint = document.getElementById('install-hint');

        function showBanner() {
            if (!banner) return;
            // Already installed as PWA?
            if (window.matchMedia('(display-mode: standalone)').matches) return;
            if (window.navigator.standalone === true) return;
            banner.style.display = 'flex';
        }

        // Android Chrome: real install prompt
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            showBanner();
        });

        // iOS detection
        var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        var isInStandaloneMode = window.navigator.standalone;

        if (isIOS && !isInStandaloneMode) {
            if (hint) hint.textContent = 'Tap Share → Add to Home Screen';
            if (installBtn) installBtn.style.display = 'none';
            showBanner();
        }

        // If not iOS and no prompt after 3s, show with browser menu instructions
        setTimeout(function() {
            if (!deferredPrompt && !isIOS) {
                if (hint) hint.textContent = 'Tap ⋮ menu → Add to Home Screen';
                if (installBtn) installBtn.style.display = 'none';
                showBanner();
            }
        }, 3000);

        // Install button click
        if (installBtn) {
            installBtn.addEventListener('click', async function() {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    var result = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    banner.style.display = 'none';
                }
            });
        }

        window.addEventListener('appinstalled', function() {
            banner.style.display = 'none';
        });
    })();
    </script>
</body>

</html>
